slam_toolbox:
  ros__parameters:
    use_sim_time: false
    slam_toolbox_mode: "mapping"
    resolution: 0.05
    max_laser_range: 12.0
    minimum_time_interval: 0.20
    transform_publish_period: 0.05
    map_update_interval: 2.0
    scan_topic: scan
    odom_frame: odom
    base_frame: base_link
    map_frame: map
    publish_tf: true
    enable_interactive_mode: false
