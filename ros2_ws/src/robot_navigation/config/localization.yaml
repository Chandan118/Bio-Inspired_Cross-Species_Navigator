ekf_filter_node:
  ros__parameters:
    use_sim_time: false
    frequency: 30.0
    sensor_timeout: 0.5

    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.0

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    imu0: imu/data
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true

    odom0: /wheel/odometry
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_differential: true
    odom0_relative: false

    gps0: gps/fix
    gps0_config: [false, false, false,
                  false, false, false,
                  true,  true,  false,
                  false, false, false,
                  false, false, false]
    gps0_differential: false
    gps0_queue_size: 5
    gps0_relative: false

    process_noise_covariance: [0.05, 0,    0,    0,    0,    0,
                               0,    0.05, 0,    0,    0,    0,
                               0,    0,    0.01, 0,    0,    0,
                               0,    0,    0,    0.05, 0,    0,
                               0,    0,    0,    0,    0.05, 0,
                               0,    0,    0,    0,    0,    0.01]

    initial_estimate_covariance: [0.5, 0,   0,   0,   0,   0,
                                  0,   0.5, 0,   0,   0,   0,
                                  0,   0,   0.2, 0,   0,   0,
                                  0,   0,   0,   0.5, 0,   0,
                                  0,   0,   0,   0,   0.5, 0,
                                  0,   0,   0,   0,   0,   0.2]

navsat_transform:
  ros__parameters:
    use_sim_time: false
    frequency: 30.0
    wait_for_datum: false
    delay: 0.0
    magnetic_declination_radians: 0.0
    yaw_offset: 0.0
    zero_altitude: true
    use_odometry_yaw: true
    broadcast_cartesian_transform: false
